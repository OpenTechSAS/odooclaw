services:
  # ─────────────────────────────────────────────
  # OdooClaw Gateway (Long-running Bot)
  # ─────────────────────────────────────────────
  odooclaw-gateway:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: odooclaw-gateway
    restart: on-failure
    profiles:
      - gateway
    environment:
      # 👇 ESTA ES LA LÍNEA MÁGICA QUE FALTA 👇
      - HOME=/home/odooclaw
      - ANTHROPIC_API_KEY
      - ODOO_URL
      - ODOO_DB
      - ODOO_USERNAME
      - ODOO_PASSWORD
      - ODOOCLAW_CONFIG=/home/odooclaw/.odooclaw/config.json
      - COMPOSE_PROFILES=gateway
    volumes:
      - ./data:/home/odooclaw/.odooclaw
      - ../config/config.json:/home/odooclaw/.odooclaw/config.json
