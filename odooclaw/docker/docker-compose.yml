services:
  # ─────────────────────────────────────────────
  # OdooClaw Agent (one-shot query)
  #   docker compose -f docker/docker-compose.yml run --rm odooclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  odooclaw-agent:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: odooclaw-agent
    profiles:
      - agent
    environment:
      - ODOOCLAW_AGENTS_DEFAULTS_PROVIDER
      - ODOOCLAW_AGENTS_DEFAULTS_MODEL
      - ODOOCLAW_PROVIDERS_ANTHROPIC_API_KEY
      - ODOO_URL
      - ODOO_DB
      - ODOO_USERNAME
      - ODOO_PASSWORD
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.odooclaw
      - ../config/config.json:/root/.odooclaw/config.json
    entrypoint: [ "odooclaw", "agent" ]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # OdooClaw Gateway (Long-running Bot)
  #   docker compose -f docker/docker-compose.yml up odooclaw-gateway
  # ─────────────────────────────────────────────
  odooclaw-gateway:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: odooclaw-gateway
    restart: on-failure
    profiles:
      - gateway
    environment:
      - ODOOCLAW_CHANNELS_ODOO_ENABLED
      - ODOOCLAW_CHANNELS_ODOO_WEBHOOK_HOST
      - ODOOCLAW_CHANNELS_ODOO_WEBHOOK_PORT
      - ODOOCLAW_CHANNELS_ODOO_WEBHOOK_PATH
      - ODOOCLAW_AGENTS_DEFAULTS_PROVIDER
      - ODOOCLAW_AGENTS_DEFAULTS_MODEL
      - ODOOCLAW_PROVIDERS_ANTHROPIC_API_KEY
      - ODOO_URL
      - ODOO_DB
      - ODOO_USERNAME
      - ODOO_PASSWORD
      - ODOOCLAW_MODELS_0_ID
      - ODOOCLAW_MODELS_0_PROVIDER
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/root/.odooclaw
      
