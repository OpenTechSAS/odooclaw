services:
  # ─────────────────────────────────────────────
  # OdooClaw Agent (one-shot query)
  # ─────────────────────────────────────────────
  odooclaw-agent:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: odooclaw-agent
    profiles:
      - agent
    environment:
      - ANTHROPIC_API_KEY
      - ODOO_URL
      - ODOO_DB
      - ODOO_USERNAME
      - ODOO_PASSWORD
      - ODOOCLAW_CONFIG=/root/.odooclaw/config.json
    volumes:
      - ./data:/root/.odooclaw
      - ../config/config.json:/root/.odooclaw/config.json
    entrypoint: [ "odooclaw", "agent" ]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # OdooClaw Gateway (Long-running Bot)
  # ─────────────────────────────────────────────
  odooclaw-gateway:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: odooclaw-gateway
    restart: on-failure
    profiles:
      - gateway
    environment:
      - ANTHROPIC_API_KEY
      - ODOO_URL
      - ODOO_DB
      - ODOO_USERNAME
      - ODOO_PASSWORD
      - ODOOCLAW_CONFIG=/root/.odooclaw/config.json
      - COMPOSE_PROFILES=gateway
    volumes:
      - ./data:/root/.odooclaw
      - ../config/config.json:/root/.odooclaw/config.json
