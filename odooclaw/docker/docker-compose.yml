services:
  # ─────────────────────────────────────────────
  # OdooClaw Gateway (Long-running Bot)
  # ─────────────────────────────────────────────
  odooclaw-gateway:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    container_name: odooclaw-gateway
    user: "1000:1000"  # 👈 FORZAMOS EL USUARIO NO-ROOT
    working_dir: /home/odooclaw # 👈 ESTABLECEMOS EL DIRECTORIO DE TRABAJO
    restart: on-failure
    profiles:
      - gateway
    environment:
      - HOME=/home/odooclaw
      - ANTHROPIC_API_KEY
      - ODOO_URL
      - ODOO_DB
      - ODOO_USERNAME
      - ODOO_PASSWORD
      - ODOOCLAW_CONFIG=/home/odooclaw/.odooclaw/config.json
      - COMPOSE_PROFILES=gateway
    volumes:
      - ./data:/home/odooclaw/.odooclaw
      - ../config/config.json:/home/odooclaw/.odooclaw/config.json
