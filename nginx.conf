worker_processes 1;

events { worker_connections 1024; }

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # --- LOGS (Visibles en el panel de Dokploy) ---
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # --- RENDIMIENTO Y SEGURIDAD ---
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 100M;
    
    # Buffers optimizados para archivos pesados de Odoo
    proxy_buffers 16 64k;
    proxy_buffer_size 128k;
    proxy_busy_buffers_size 128k;

    # --- TURBO: COMPRESIÓN GZIP ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    server {
        listen 80;
        
        # Resolución DNS interna de Docker (Forzando IPv4)
        resolver 127.0.0.11 valid=10s ipv6=off;

        # Cabeceras estándar para Odoo en modo Proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Date; # Evita el warning de cabecera duplicada

        # Tiempos de espera extendidos (Importante para reportes y carga de módulos)
        proxy_read_timeout 3600s;
        proxy_connect_timeout 3600s;
        proxy_send_timeout 3600s;

        # --- CHAT / MENSAJERÍA (WebSocket puerto 8072) ---
        location /websocket {
            set $odoo_chat "http://web:8072"; 
            proxy_pass $odoo_chat;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # --- INTERFAZ WEB (Odoo puerto 8069) ---
        location / {
            set $odoo_web "http://web:8069"; 
            proxy_pass $odoo_web;
            proxy_redirect off;
            
            # Caché agresiva para archivos estáticos (Mejora mucho la velocidad)
            location ~* /web/static/ {
                proxy_cache_valid 200 90m;
                proxy_buffering on;
                expires 864000;
                proxy_pass http://web:8069;
            }
        }
    }
}